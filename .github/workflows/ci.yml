name: ci/cd

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hacklet
          POSTGRES_PASSWORD: hacklet
          POSTGRES_DB: hacklet
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hacklet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://hacklet:hacklet@localhost:5432/hacklet
      DJANGO_SETTINGS_MODULE: hacklet.settings.dev
      SECRET_KEY: ci-not-secret
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --group dev
      - run: uv run --group dev pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@10
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  deploy:
    # Gate: only after both test jobs pass, and only on a push to main (never PRs).
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, hacklet-vm]
    concurrency:
      group: deploy-vm
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/deploy.sh
        env:
          # Absolute path to the deployment clone on the VM (repo Variable).
          # Falls back to $HOME/hacklet-league if unset.
          HACKLET_DIR: ${{ vars.DEPLOY_DIR }}
