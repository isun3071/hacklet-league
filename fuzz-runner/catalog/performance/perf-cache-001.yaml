id: perf-cache-001
bundle: performance
category: caching
pool: public
evidence_model: provable
penalty: 8   # static asset not cacheable -> a full refetch on every page load (bandwidth + latency)
applicability:
  requires: [at_least_one_http_endpoint_exists]
probe:
  # fan across same-origin static assets (JS/CSS/image/font); fire on the first that is uncacheable:
  # no validator/freshness, Cache-Control: no-store, or a validator the server won't honor with a 304
  predicate: caching_ineffective
  target: /
  max_attempts: 20
