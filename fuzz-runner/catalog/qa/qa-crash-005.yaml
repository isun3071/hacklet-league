id: qa-crash-005
bundle: qa
category: crash-resistance
pool: public
evidence_model: provable
penalty: 6
applicability:
  requires: [at_least_one_http_endpoint_exists]
probe:
  method: POST
  target: /api/items
  headers:
    content-type: application/json
  body: '{"name": 42}'   # wrong type (number where a string is expected) -> should be 400, not 500
slop_if:
  - response_server_error
