id: qa-links-001
bundle: qa
category: broken-links
pool: public
evidence_model: provable
penalty: 12   # within-QA calibration (NOT a QA-vs-security retreat): a single dead internal link's own
              # freq×sev is genuinely lower than its tier-mates (a11y 26, crash 32). At 24 it ranked near
              # CSRF (25), overstating one broken link relative to real accessibility/crash failures. 24->12.
applicability:
  requires: [at_least_one_http_endpoint_exists]
probe:
  # fetch each same-origin <a href> on the homepage; fire on the first that lands on a 4xx.
  # redirects are followed (a redirect that resolves is not broken); 5xx is left to crash-resistance
  predicate: broken_links
  target: /
  max_attempts: 40
