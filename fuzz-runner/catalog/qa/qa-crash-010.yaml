id: qa-crash-010
bundle: qa
category: crash-resistance
pool: public
evidence_model: provable
penalty: 32   # unhandled 5xx on malformed input; every wrong-order user hits it. ~32% of
              # users churn after ONE bad experience (PwC 2018) -> near the qa/perf top.
applicability:
  requires: [at_least_one_http_endpoint_exists]
probe:
  # malformed field values / malformed JSON / decode-crashing paths; fires on a 5xx (not a graceful 4xx)
  predicate: crash_resistance
  max_attempts: 120
