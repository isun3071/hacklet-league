id: sec-headers-006
bundle: security
category: security-headers
pool: public
evidence_model: provable
penalty: 2
applicability:
  requires: [at_least_one_http_endpoint_exists]
probe:
  target: /   # X-Powered-By is a global response header -> check once on the homepage
slop_if:
  - response_has_header: x-powered-by
