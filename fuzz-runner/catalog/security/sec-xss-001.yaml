id: sec-xss-001
bundle: security
category: xss
pool: public
evidence_model: provable
penalty: 35   # XSS is the #1 serious vuln in AI-generated code and a real exploit vector. Raised 30->35 so the
              # exploit tier outranks the worst QA/perf annoyances per-instance (slow load-time 34, crash 32):
              # exploit > slow > crash. This fixes the ordering by lifting the exploit, NOT by clawing back the
              # deliberate QA/perf aggregate weight. Sits below the catastrophic ceiling (40: SQLi/RCE/IDOR).
applicability:
  requires: [any_endpoint_accepts_text_input]
probe:
  # comprehensive reflected+stored XSS. A cheap server-side pre-filter (unescaped reflection of a unique
  # marker) narrows the surface; a GET reflection is then CONFIRMED BY EXECUTION in a headless browser
  # (the payload actually runs across body/attribute/script contexts) — presence of the string is NOT the
  # signal, which kills the RSC/JSON flight-data FP class. POST/stored (and no-browser mode) fall back to
  # the hardened unescaped-reflection heuristic. dom_xss (sec-domxss-001) covers pure DOM-sink execution.
  predicate: xss_injectable
  max_attempts: 150
