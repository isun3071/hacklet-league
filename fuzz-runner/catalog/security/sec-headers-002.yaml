id: sec-headers-002
bundle: security
category: security-headers
pool: public
evidence_model: provable
penalty: 12   # risk=freq×sev: the master backstop for the whole XSS class (+ clickjacking / mixed-content /
              # form-hijack). Conditional (needs another vuln to bite) so it stays a defense-in-depth tier —
              # below the unconditional-misconfig tier (rate-limit/samesite 15) and the active-XSS probe (30) —
              # but clearly ABOVE the charset/info-disclosure floor: it is not a chore header. Other security
              # headers reviewed and held (nosniff 3 / HSTS 5 / clickjacking 5 / referrer 2 / x-powered-by 2):
              # genuinely narrow, conditional, low-severity mitigations.
applicability:
  requires: [at_least_one_http_endpoint_exists]
probe:
  target: /   # CSP is a global response header -> check once on the homepage (the always-present route)
slop_if:
  - response_missing_header: content-security-policy
