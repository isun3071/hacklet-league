id: sec-ratelimit-001
bundle: security
category: rate-limiting
pool: public
evidence_model: oracle
penalty: 15   # no brute-force protection on login -> credential stuffing / password spraying
applicability:
  # not gated on a discovered HTML password form: the predicate itself finds the login surface
  # (HTML form OR JSON-API endpoint like /rest/user/login) and returns N/A when neither exists.
  requires: [at_least_one_http_endpoint_exists]
probe:
  predicate: login_no_rate_limit
  attempts: 10   # wrong-password logins to fire; slop if none is throttled (429/423)
