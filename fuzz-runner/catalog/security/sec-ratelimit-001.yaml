id: sec-ratelimit-001
bundle: security
category: rate-limiting
pool: public
evidence_model: oracle
penalty: 15   # no brute-force protection on login -> credential stuffing / password spraying
applicability:
  requires: [any_form_has_password]
probe:
  predicate: login_no_rate_limit
  attempts: 10   # wrong-password logins to fire; slop if none is throttled (429/423)
