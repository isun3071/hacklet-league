id: sec-secrets-001
bundle: security
category: secrets-exposure
variant_group_id: secrets-exposure   # "this app leaks secrets" is one finding, however many routes
pool: public
evidence_model: provable
penalty: 35   # top-tier: secrets exposure is ~21% of real vibe-coded-app vulnerabilities
applicability:
  requires: [at_least_one_http_endpoint_exists]
probe:
  target: routes   # scan every discovered page AND JS asset for hardcoded server secrets
slop_if:
  - response_leaks_secret
