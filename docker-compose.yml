# HackLet League — portable deployment stack.
#
# Host-agnostic: runs identically on the home Proxmox VM today and a Hetzner VPS
# later. Only .env differs between hosts. See DEPLOY.md.
#
#   caddy    -> serves the landing page at /, reverse-proxies /api /admin /static to backend
#   backend  -> Django (gunicorn). Runs migrate + collectstatic on start.
#   db       -> PostgreSQL 16

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set SITE_ADDRESS in .env (e.g. hackletleague.com for HTTPS, or http://localhost)}
      LAN_ADDRESS: ${LAN_ADDRESS:-http://localhost}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env (for Let's Encrypt)}
      # Secret admin slug — Caddy serves it only to the tailnet. Must match the backend's.
      ADMIN_PATH: ${ADMIN_PATH:-admin}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./landing:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-hacklet.settings.dev}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      DATABASE_URL: ${DATABASE_URL:-postgres://hacklet:hacklet@db:5432/hacklet}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://hackletleague.com}
      # Secret path the Django admin is mounted at. Must match Caddy's ADMIN_PATH.
      ADMIN_PATH: ${ADMIN_PATH:-admin}
      # Transactional email. RESEND_API_KEY (HTTP API) wins; SMTP is the fallback.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-HackLet League <no-reply@hackletleague.com>}
      # Google OAuth (social login); read by settings.SOCIALACCOUNT_PROVIDERS.
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_SECRET: ${GOOGLE_OAUTH_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    # No host port published; Caddy reaches it on the internal network as backend:8000.

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      # Server-side (SSR) fetches reach the backend over the internal docker network.
      INTERNAL_API_URL: http://backend:8000
    # No host port published; Caddy reaches it at frontend:3000.

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hacklet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hacklet}
      POSTGRES_DB: ${POSTGRES_DB:-hacklet}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hacklet}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
  pgdata:
